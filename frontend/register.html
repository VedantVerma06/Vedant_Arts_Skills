<!DOCTYPE html>
<html>
<head>
  <title>VedantArtsSkills - Register</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="auth-card glass-card">
    <h1>Create Account</h1>
    <p>Join VedantArtsSkills to interact with artworks and place custom orders.</p>
    <input id="registerUsername" placeholder="Username">
    <input id="registerEmail" type="email" placeholder="Email">
    <input id="registerPassword" type="password" placeholder="Password">
    <input id="registerConfirmPassword" type="password" placeholder="Confirm Password">
    <button id="registerBtn" onclick="register()">Register</button>
    <p>Already have an account? <a href="index.html">Login</a></p>
  </div>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
